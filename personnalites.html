<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CityLoop Quest Bruxelles- Au cœur de l’Europe</title>
<link href="style.css" rel="stylesheet"/>
<script src="translations/translationManager.js"></script>
<script src="translations/languageSelector.js"></script>
<script>window.REQUIRES_FULL = true;</script>
<script src="api-base.js"></script>
<script src="js/access-control.js"></script>

<!-- Garde d'accès : bloque l'accès si aucun code d'activation valide (clq_short_code) -->
<script src="js/access-guard.js" defer></script>




</head>
<body>

<header class="main-header">
    <div class="header-content">
        <img src="images/icone titre0.png" alt="Icone 0" class="header-img left">
        <h1 id="mainTitle" data-translate="title_chevauchee">CityLoop Quest Bruxelles- Au cœur de l’Europe</h1>
        <img src="images/icone titre1.png" alt="Icone 1" class="header-img right">
    </div>
</header>
<main style="text-align:center; padding:20px;">
  <h2 data-translate="personnalites_subtitle">Personnalités de Bruxelles</h2>

  <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; max-width:600px; margin:auto;">
    <button data-personnalite-target="architecture.html" data-requires-full="1" data-translate="personnalites_architecture">🏛️ Architecture</button>
    <button data-personnalite-target="peinture_sculpture.html" data-requires-full="1" data-translate="personnalites_peinture_sculpture">🎨 Peinture et sculpture</button>
    <button data-personnalite-target="BD.html" data-requires-full="1" data-translate="personnalites_BD">📚 Bande dessinée</button>
    <button data-personnalite-target="musique-personnalites.html" data-requires-full="1" data-translate="personnalites_musique">🎵 Musique</button>
    <button data-personnalite-target="cine_theatre.html" data-requires-full="1" data-translate="personnalites_cinema_theatre">🎬 Ciné, Théâtre et Littérature</button>
    <button data-personnalite-target="sciences.html" data-requires-full="1" data-translate="personnalites_sciences">🔬 Sciences</button>
    <button data-personnalite-target="politique_armee.html" data-requires-full="1" data-translate="personnalites_politique_armee">⚖️ Politique, Armée</button>
    <button data-personnalite-target="sports.html" data-requires-full="1" data-translate="personnalites_sports">⚽ Sports</button>
    <button data-personnalite-target="autres.html" data-requires-full="1" data-translate="personnalites_autres">📋 Autres</button>
  </div>

  <div style="margin-top:40px;"></div>
</main>


<button class="back-button" id="back-button" data-translate="back">BACK</button>
<script>

// ----------------- NAVIGATION PERSONNALITES -----------------
function goToPersonnalitePage(target, requiresFull) {
  const version = window.accessControl?.currentVersion;

  if (requiresFull) {
    // délégué au contrôleur central
    if (window.checkPageAccess && !window.checkPageAccess(target)) return;
  }
  window.location.href = target;
}

// ----------------- INIT PAGE / LANGUE -----------------
function initPersonnalitesPage() {
  if (window.translationManager?.isLoaded) {
    window.languageSelector?.createSelector?.();
    window.languageSelector?.updateSelectorValue?.();
  } else {
    setTimeout(initPersonnalitesPage, 100);
  }
}

document.addEventListener("DOMContentLoaded", () => {
  initPersonnalitesPage();
  
  const backButton = document.getElementById("back-button");
  if (backButton) {
    backButton.addEventListener("click", () => {
      window.location.href = "culture.html";
    });
  }

  // Boutons de navigation personnalités
  document.querySelectorAll('[data-personnalite-target]').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.getAttribute('data-personnalite-target');
      const requiresFull = btn.getAttribute('data-requires-full') === '1';
      goToPersonnalitePage(target, requiresFull);
    });
  });
});
</script>
</body>
</html>
